name: Bug report
description: Report a problem with RiftRoute
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. For **security vulnerabilities**, do not file a
        public issue — see [SECURITY.md](../blob/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, what did you expect, and what happened instead?
      placeholder: Steps to reproduce, expected vs actual behavior.
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: RiftRoute version
      description: Output of `riftroute version` (or the commit hash).
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Where did it happen?
      options:
        - CLI (riftroute)
        - Daemon (riftrouted)
        - Desktop app (RiftRoute.app)
        - Tray
        - Other
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics
      description: Paste `riftroute doctor` and `riftroute status` output if relevant.
      render: shell
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant daemon logs (scrub anything sensitive).
      render: shell
